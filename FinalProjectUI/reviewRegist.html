        #category:focus {
            outline: none;

        option {

        }

        .register_button {
            display: flex;
            margin-top: 20px;

        }

        .register_btn {
            margin-top: 5px;
            position: relative;
            text-align: center;
            right: 10px;
            font-size: 13px;
        }

        .register_btn span {
            margin: 0 5px;
            padding: 7px 13px;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            width: 200px;
        }

        .register_btn span:hover {
            background-color: #f8f9fa;
        }

        .title {
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            width: 300px;
        }

            outline: none;

                        <p>로그인</p>
                    </div>
                </div>

    </header>

    <!-- Review Regist -->
    <div class="register">
        <div class="review_title">
            <p style="font-size: 25px;">
                <b>
                    리뷰 작성하기
                </b>
            </p>
            <hr>
        </div>
        <div class="register_title">
            <form action="./reviewBaord.html" method="get" name="board" id="board">
                <p style="font-size: 20px;">
                    <input type="text" class="title mt-4" placeholder="제목">
                </p>
                <div class="writer mb-3">
                    <span>문정배</span>
                </div>
        </div>
        <div class="register_category">
            <select name="category" id="category">
                <option value="culture">문화/예술</option>
                <option value="food">푸드/드링크</option>
                <option value="hobby">취미</option>
                <option value="travel">여행</option>
                <option value="edu">교육</option>
            </select>
        </div>
        <div class="register_body">

            <div class="mb-2 mt-2">
                <label for="content" class="mb-3"></label>
                <textarea class="form-control" rows="10" id="content" name="text" class="content"
                    placeholder="내용작성"></textarea>
            </div>
            <div class="register_button">
                <input type="file" class="file">

                <div>
                    <a href="#" class="register_btn" id="register_btn"><span>작성하기</span></a>
                    <a href="#" class="register_btn" id="list"><span>목록</span></a>
                </div>
                </form>
            </div>
            <script>
                function onload() {
                    const formObj = document.querySelector("#board");
                    const btnObj = document.querySelector("#register_btn");

                    btnObj.addEventListener("click", (event) => {
                        formObj.submit();

                    })
                }
            </script>

        </div>
    </div>



    <!-- Tags -->
    <div class="container pt-5 pb-0 mt-5">
