spring.application.name=Morakmorak

# Import .env file
spring.config.import=optional:file:.env[.properties]

# JSP 뷰 설정 - prefix와 suffix를 설정 (View Resolver)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

## JDBC 데이터베이스 연결
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=clubsite
spring.datasource.password=123456

# Hikari Datasource 커넥션 풀 설정 및 validation query(MySQL에서는 SELECT 1)
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

## Mybatis 설정
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

## 파일 업로드 관련 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

## 업로드 경로 설정 (서버의 임시 디렉토리 경로)
upload.path=C:/upload

## 메시지 리소스 설정
spring.messages.basename=message.message

# 기본 보안 설정
spring.security.user.name=test
spring.security.user.password=test
spring.security.user.roles=MEMBER



# Hibernate Dialect 설정 (Oracle을 위한 Dialect)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect


# Hibernate 관련 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


